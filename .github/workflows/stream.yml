name: Stream Bot

on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: "Stream URL"
        required: true
      rtmp_url:
        description: "RTMP URL"
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium

      # استخراج الرابط الحقيقي
      - name: Extract Stream
        run: node extractor.js "${{ inputs.stream_url }}"

      # تشغيل FFmpeg (كما طلبت بالضبط)
      - name: Run FFmpeg
        run: |
          ffmpeg -re -i "$(cat stream.txt)" \
          -f flv "${{ inputs.rtmp_url }}"
