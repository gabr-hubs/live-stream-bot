name: Stream Bot

on:
  workflow_dispatch:
    inputs:
      stream_url:
        description: "Stream URL"
        required: true
      rtmp_url:
        description: "RTMP URL"
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx playwright install chromium

      - run: node extractor.js "${{ inputs.stream_url }}"

      - run: ffmpeg -re -i "$(cat stream.txt)" -f flv "${{ inputs.rtmp_url }}"
